version: "3.9"

services:

  postgres:
    image: postgres:16

    container_name: tax_rag_postgres

    environment:
      POSTGRES_DB: tax_rag
      POSTGRES_USER: tax_rag
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    container_name: tax_rag_redis

    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest

    container_name: tax_rag_qdrant

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  # Fast API Backend
  api:
    build: 
      context: .
      dockerfile: Dockerfile.api
    container_name: adaptive-rag-api
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - QDRANT_HOST=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://tax_user:securepassword@postgres:5432/tax_db
      - OLLAMA_HOST=http://ollama:11434
      - LOCAL_MODEL_NAME=qwen3-tax
    depends_on:
      - qdrant
      - redis
      - postgres
      - ollama
    volumes:
      - api_cache:/root/.cache/huggingface

  # Ollama Local LLM Server
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    ports:
      - "11434:11434"
    volumes:
      - ./finetuning/checkpoints:/models
      - ollama_data:/root/.ollama
    restart: always

volumes:

  postgres_data:

  qdrant_data:

  ollama_data:
  
  api_cache: